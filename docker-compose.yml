version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: library-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: replace-with-local-minio-credential
      MINIO_ROOT_PASSWORD: replace-with-local-minio-credential
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  create-bucket:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 replace-with-local-minio-credential replace-with-local-minio-credential;
      /usr/bin/mc mb myminio/library-bucket || true;
      /usr/bin/mc anonymous set public myminio/library-bucket;
      exit 0;
      "

volumes:
  redis_data:
  minio_data:
